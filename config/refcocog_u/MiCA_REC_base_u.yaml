# =====================================================================
# MiCA REC (Referring Expression Comprehension) 任务配置文件 - RefCOCOg-umd
# UMD划分版本，有val和test集
# =====================================================================

DATA:
  dataset: refcocog_u
  train_lmdb: datasets/lmdb/refcocog_u/train.lmdb
  train_split: train
  val_lmdb: datasets/lmdb/refcocog_u/val.lmdb
  val_split: val
  mask_root: datasets/masks/refcocog_u
  
  # =========================== 任务配置 ===========================
  # task: 'ris' (Referring Image Segmentation) 或 'rec' (Referring Expression Comprehension)
  task: 'rec'  # REC任务
  
TRAIN:
  # =========================== ADAPTER 配置 ===========================
  # 与RIS保持一致的Adapter配置，以验证泛化性
  
  # 1. 原版复杂adapter (已完全移除)
  visual_adapter_dim: 128
  visual_adapter_layer: []
  txt_adapter_dim: 64
  txtual_adapter_layer: []
  
  # 2. 串联Adapter配置 (Multi-Scale Lite Adapter) - MiCA核心模块
  use_multiscale_lite_adapter: True
  visual_multiscale_lite_adapter:
    enabled: True
    dim: 128
    layers: [1,5,9]
    kernel_sizes: [3, 5, 7]
    num_heads: 4
    scaling_factor: 0.5
    learnable_scale: True
    dropout: 0.1
  
  text_multiscale_lite_adapter:
    enabled: True
    dim: 64
    layers: [1,5,9]
    kernel_sizes: [3, 5, 7]
    num_heads: 4
    scaling_factor: 0.5
    learnable_scale: True
    dropout: 0.1
  
  # 3. 并联Adapter配置
  use_parallel_v2_adapter: True
  parallel_v2_visual_adapter:
    enabled: True
    dim: 128
    layers: [3,7,11]
    kernel_sizes: [3, 5, 7]
    embed_dim: 128
    num_heads: 8
    text_dim: 512
    scaling_factor: 0.2
    learnable_scale: True
    dropout: 0.1
    skip_connect: False
    use_film: True
  
  use_parallel_v2_text_adapter: True
  parallel_v2_text_adapter:
    enabled: True
    dim: 64
    layers: [3,7,11]
    kernel_sizes: [3, 5, 7]
    num_heads: 4
    scaling_factor: 0.2
    learnable_scale: True
    dropout: 0.1
    skip_connect: False
  
  # =========================== 模型架构配置 ===========================
  
  # Base Arch
  clip_pretrain: pretrain/ViT-B-16.pt
  dino_pretrain: pretrain/dinov2_vitb14_reg4_pretrain.pth
  dino_layers: 12
  output_dinov2: [4, 8]
  dino_name: dino-base
  model_name: CLIP-b-16
  input_size: 448
  word_len: 17
  word_dim: 512
  ladder_dim: 128
  nhead: 8
  multi_stage: 3
  stride: [1, 1, 1]
  vis_dim: 512
  fpn_in: [768, 768, 768]
  fpn_out: [256, 512, 1024]
  sync_bn: True

  # Decoder
  num_layers: 3
  num_head: 8
  dim_ffn: 512
  dropout: 0.1
  intermediate: False 
  
  # =========================== 训练配置 ===========================
  
  # Training Setting
  workers: 32
  workers_val: 16
  epochs: 50
  milestones: [35]
  start_epoch: 0
  batch_size: 32
  batch_size_val: 64
  base_lr: 0.0001
  lr_decay: 0.1
  lr_multi: 1.0
  weight_decay: 0.
  max_norm: 1.0
  manual_seed: 0
  print_freq: 100
  
  # Resume & Save
  exp_name: MiCA_REC_base_u
  output_folder: exp/refcocog_u_rec
  save_freq: 1
  weight:
  resume:
  evaluate: True

TEST:
  test_split: test
  test_lmdb: datasets/lmdb/refcocog_u/test.lmdb
  visualize: False
